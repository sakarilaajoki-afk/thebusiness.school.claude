<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<title>Business Card — Back (print)</title>
<style>
  @page { size: 89mm 59mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 89mm; height: 59mm; }
  body { width: 89mm; height: 59mm; overflow: hidden; background: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .card {
    width: 89mm; height: 59mm; position: relative; overflow: hidden;
    color:#1b1b1b; background:#fff;
  }
  .card::after {
    content:''; position:absolute; top:0; left:0; right:0; height:1.2mm;
    background: linear-gradient(90deg, #1a1a2e 0%, #0f3460 50%, #f4c542 100%);
  }
  .inner {
    position:absolute; top:6mm; left:6mm; right:6mm; bottom:5mm;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .brand { font-size:3mm; font-weight:800; letter-spacing:-0.2px; color:#1a1a2e; }
  .brand .dot { color:#f4c542; }
  .headline { font-size:7.2mm; font-weight:800; color:#1a1a2e; letter-spacing:-0.3px; text-transform:uppercase; margin-top:3mm; margin-bottom:1mm; line-height:1; }
  .sub { font-size:2.2mm; color:#e94560; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:3.5mm; }
  .contact { font-size:2.3mm; color:#1b1b1b; line-height:1.55; }
  .contact .row { display:flex; align-items:center; gap:2mm; margin-bottom:0.4mm; }
  .contact .label { color:#6c757d; font-size:1.7mm; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; min-width:11mm; }
  .contact .val { font-weight:600; }

  .footer {
    display:flex; justify-content:space-between; align-items:flex-end;
    border-top:0.2mm solid #e5e7eb; padding-top:2.5mm;
  }
  .company { font-size:1.8mm; color:#6c757d; line-height:1.4; }
  .company strong { color:#1a1a2e; font-weight:700; }
  .partner { text-align:right; font-size:1.7mm; color:#6c757d; line-height:1.4; }
  .partner strong { color:#1a1a2e; font-weight:700; display:block; }
</style>
</head>
<body>
  <div class="card">
    <div class="inner">
      <div>
        <div class="brand">The Business<span class="dot">.</span>School</div>
        <div class="headline">Get in touch.</div>
        <div class="sub">Free trial · Questions · Partnerships</div>
        <div class="contact">
          <div class="row"><span class="label">Web</span><span class="val">thebusiness.school</span></div>
          <div class="row"><span class="label">Email</span><span class="val">sakari.laajoki@gmail.com</span></div>
        </div>
      </div>
      <div class="footer">
        <div class="company">
          <strong>TBS Education Ltd Oy</strong><br>
          Helsinki, Finland · Business ID 3614159-3
        </div>
        <div class="partner">
          <strong>Appifest</strong>
          Engineering partner · Sydney
        </div>
      </div>
    </div>
  </div>
</body>
</html>
